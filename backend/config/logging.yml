version: 1
disable_existing_loggers: False

formatters:
  standard:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  detailed:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(module)s:%(funcName)s:%(lineno)d - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/app.log
    maxBytes: 10485760
    backupCount: 5

loggers:
  staging:
    level: DEBUG
    handlers: [console, file]
    propagate: no
  
  uvicorn:
    level: INFO
    handlers: [console]
    propagate: no
  
  uvicorn.error:
    level: INFO
    handlers: [console]
    propagate: no
  
  uvicorn.access:
    level: INFO
    handlers: [console]
    propagate: no

root:
  level: INFO
  handlers: [console, file]
