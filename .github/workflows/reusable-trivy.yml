name: "Trivy (Reusable)"
on:
  push:
    branches: [DT-454]
  # schedule:
    # Once a day
    # - cron: "0 0 * * 0"
  workflow_dispatch:
  # Trigger manually

env:
  IMAGE_NAMESPACE: 'harbor-hub-shared.arena.3ascloud.de/arena2036'
  # BACKEND_IMAGE_NAME: 'emc-backend'
  # FRONTEND_IMAGE_NAME: 'emc-frontend'
  # SERVER_URL: '${{ github.server_url }}'
  # REPOSITORY: '${{ github.repository }}'
  # REF_NAME: '${{ github.ref_name }}'

permissions:
  contents: read

jobs:
  trivy-config:
    name: Trivy Config Scan
    uses: eclipse-tractusx/sig-infra/.github/workflows/reusable-trivy.yaml@main
    with:
      scan-type: "config"
      output-file: "trivy-config.sarif"
      severity: "CRITICAL,HIGH"
    permissions:
      actions: read
      contents: read
      security-events: write

# BACKEND IMAGE SCAN
  trivy-backend:
    name: Trivy Backend Scan
    uses: eclipse-tractusx/sig-infra/.github/workflows/reusable-trivy.yaml@main
    with:
      scan-type: "image"
      image-ref: 'harbor-hub-shared.arena.3ascloud.de/arena2036/emc-backend:latest'      
      output-file: "trivy-backend.sarif"
      severity: "CRITICAL,HIGH"
    permissions:
      actions: read
      contents: read
      security-events: write